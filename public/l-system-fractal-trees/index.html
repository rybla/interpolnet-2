<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | L-System Fractal Trees</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="control-panel">
        <header>
          <h1>L-System Explorer</h1>
          <p>Interactive Grammar Editor</p>
        </header>

        <section class="controls">
          <div class="input-group">
            <label for="axiom">Axiom</label>
            <input type="text" id="axiom" value="F" spellcheck="false" autocomplete="off" />
          </div>

          <div class="rules-container">
            <div class="rules-header">
              <label>Rules</label>
              <button id="add-rule-btn" class="icon-btn" title="Add Rule" aria-label="Add Rule">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              </button>
            </div>
            <div id="rules-list" class="rules-list">
              <!-- Rules will be dynamically inserted here -->
            </div>
          </div>
        </section>

        <section class="instructions">
          <p>Grammar characters:</p>
          <ul>
            <li><code>F</code> or <code>A</code>, <code>B</code>: Draw forward</li>
            <li><code>f</code>: Move forward without drawing</li>
            <li><code>+</code>: Turn right</li>
            <li><code>-</code>: Turn left</li>
            <li><code>[</code>: Save current state</li>
            <li><code>]</code>: Restore saved state</li>
          </ul>
        </section>
      </aside>

      <main class="canvas-container">
        <canvas id="lsystem-canvas"></canvas>
      </main>
    </div>

    <template id="rule-template">
      <div class="rule-row">
        <input type="text" class="rule-key" placeholder="A" maxlength="1" spellcheck="false" autocomplete="off" />
        <span class="rule-arrow">→</span>
        <input type="text" class="rule-value" placeholder="Replacement" spellcheck="false" autocomplete="off" />
        <button class="remove-rule-btn icon-btn" title="Remove Rule" aria-label="Remove Rule">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    </template>
  </body>
</html>
