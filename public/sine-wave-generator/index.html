<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Sine Wave Generator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Sine Wave Generator</h1>
        <p>Observe how uniform circular motion generates a sine wave.</p>
      </header>
      <main>
        <div class="canvas-container">
          <canvas id="simulation-canvas"></canvas>
        </div>
        <div class="controls">
          <div class="control-group">
            <label for="speed-slider">Rotation Speed: <span id="speed-value">1.0</span>x</label>
            <input type="range" id="speed-slider" min="0.1" max="5.0" step="0.1" value="1.0" />
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
