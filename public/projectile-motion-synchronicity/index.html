<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Projectile Motion Synchronicity</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <div id="control-panel">
        <h1>Projectile Motion Synchronicity</h1>
        <p>This simulation proves that horizontal velocity does not affect the time it takes for an object to fall. Two objects dropped from the same height will hit the ground simultaneously.</p>

        <div class="control-group">
          <label for="velocity-slider">Horizontal Velocity: <span id="velocity-value">100</span></label>
          <input type="range" id="velocity-slider" min="0" max="300" value="100">
        </div>

        <div class="control-group">
          <label for="gravity-slider">Gravity: <span id="gravity-value">9.8</span></label>
          <input type="range" id="gravity-slider" min="1" max="20" step="0.1" value="9.8">
        </div>

        <div class="actions">
          <button id="drop-btn">Drop Balls</button>
          <button id="reset-btn" disabled>Reset</button>
        </div>
      </div>

      <div id="simulation-container">
        <canvas id="simulation-canvas"></canvas>
      </div>
    </div>
  </body>
</html>
