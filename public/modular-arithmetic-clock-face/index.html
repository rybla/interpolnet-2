<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Modular Arithmetic Clock Face</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app-container">
      <header>
        <h1>Modular Arithmetic Clock Face</h1>
        <p>Explore modulo arithmetic continuously wrapping around a dial.</p>
      </header>
      <main>
        <div id="canvas-container">
          <canvas id="clock-canvas"></canvas>
        </div>
        <div id="control-panel">
          <div class="control-group">
            <label for="modulus-input">Modulo (n): <span id="modulus-val">12</span></label>
            <input type="range" id="modulus-input" min="2" max="60" value="12" />
          </div>

          <div class="control-group">
            <label>Operation:</label>
            <div class="radio-group">
              <input type="radio" id="op-add" name="operation" value="add" checked />
              <label for="op-add">Addition</label>

              <input type="radio" id="op-mult" name="operation" value="mult" />
              <label for="op-mult">Multiplication</label>
            </div>
          </div>

          <div class="control-group">
            <label for="value-input">Value: <span id="value-val">3</span></label>
            <input type="range" id="value-input" min="1" max="100" value="3" />
          </div>

          <div class="control-group">
            <label for="step-input">Step through values:</label>
            <input type="range" id="step-input" min="0" max="100" value="0" />
            <div class="button-row">
              <button id="btn-play-pause">Play</button>
              <button id="btn-reset">Reset</button>
            </div>
          </div>

          <div class="info-panel">
            <div id="equation-display">0 + 3 &equiv; 3 (mod 12)</div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
