<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four Color Theorem Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="instructions">
    <h1>Four Color Theorem Visualizer</h1>
    <p>Click on empty space to add a node.</p>
    <p>Drag from one node to another to create an edge.</p>
    <p>The graph is automatically 4-colored.</p>
  </div>
  <canvas id="canvas"></canvas>
  <script src="script.js"></script>
</body>
</html>
