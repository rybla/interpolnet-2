<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Conway Game of Life</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <canvas id="glcanvas"></canvas>
    <div id="ui-overlay">
      <div class="controls">
        <h2>Conway's Game of Life</h2>
        <p>Click to stamp patterns on the massive WebGL grid.</p>
        <div class="pattern-selector">
          <label>
            <input type="radio" name="pattern" value="glider" checked>
            <span>Glider</span>
          </label>
          <label>
            <input type="radio" name="pattern" value="gosper">
            <span>Gosper Glider Gun</span>
          </label>
        </div>
      </div>
    </div>
  </body>
</html>
