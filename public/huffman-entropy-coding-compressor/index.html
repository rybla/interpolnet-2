<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Huffman Entropy Coding Compressor</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Huffman Entropy Compressor</h1>
        <p>Type in the box below to see the Huffman tree generated in real time.</p>
      </header>
      <section class="input-section">
        <textarea id="text-input" placeholder="Enter some text here..." rows="5"></textarea>
      </section>
      <section class="visualization-section">
        <canvas id="tree-canvas"></canvas>
      </section>
      <section class="output-section">
        <div class="stats-card">
          <h3>Statistics</h3>
          <div class="stat-row">
            <span>Shannon Entropy:</span>
            <span id="entropy-value">0 bits/symbol</span>
          </div>
          <div class="stat-row">
            <span>Original Size:</span>
            <span id="original-size">0 bits</span>
          </div>
          <div class="stat-row">
            <span>Compressed Size:</span>
            <span id="compressed-size">0 bits</span>
          </div>
          <div class="stat-row">
            <span>Compression Ratio:</span>
            <span id="compression-ratio">0%</span>
          </div>
        </div>
        <div class="codes-card">
          <h3>Huffman Codes</h3>
          <div id="huffman-codes" class="codes-grid"></div>
        </div>
      </section>
      <section class="encoded-output-section">
        <h3>Encoded Output</h3>
        <div id="encoded-output" class="encoded-text"></div>
      </section>
    </main>
  </body>
</html>
