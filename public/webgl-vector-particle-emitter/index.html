<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | WebGL Vector Particle Emitter</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="container">
      <h1>WebGL Vector Particle Emitter</h1>
      <p>Drag the arrow heads to configure wind (cyan), gravity (magenta), and drag (yellow) vectors applied to independent points.</p>
      <div id="canvas-container">
        <!-- WebGL canvas for rendering particles -->
        <canvas id="glcanvas" width="800" height="600"></canvas>
        <!-- Overlay 2D canvas for interactive vector controls -->
        <canvas id="overlayCanvas" width="800" height="600"></canvas>
      </div>
    </div>
  </body>
</html>
