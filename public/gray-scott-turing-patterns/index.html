<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Gray-Scott Turing Patterns</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container">
        <canvas id="gl-canvas"></canvas>
      </div>
      <div id="controls-panel">
        <div class="header">
          <h1>Gray-Scott Turing Patterns</h1>
          <p>Reaction-Diffusion Simulation</p>
        </div>
        <div class="controls">
          <div class="control-group">
            <label for="feed-rate">Feed Rate (f): <span id="feed-val">0.055</span></label>
            <input type="range" id="feed-rate" min="0.01" max="0.1" step="0.001" value="0.055">
          </div>
          <div class="control-group">
            <label for="kill-rate">Kill Rate (k): <span id="kill-val">0.062</span></label>
            <input type="range" id="kill-rate" min="0.01" max="0.07" step="0.001" value="0.062">
          </div>
          <div class="control-group">
            <label for="diff-a">Diffusion A: <span id="diff-a-val">1.0</span></label>
            <input type="range" id="diff-a" min="0.1" max="1.5" step="0.01" value="1.0">
          </div>
          <div class="control-group">
            <label for="diff-b">Diffusion B: <span id="diff-b-val">0.5</span></label>
            <input type="range" id="diff-b" min="0.1" max="1.0" step="0.01" value="0.5">
          </div>
          <div class="control-group">
            <label for="brush-size">Brush Size: <span id="brush-size-val">10</span></label>
            <input type="range" id="brush-size" min="1" max="50" step="1" value="10">
          </div>
          <div class="presets">
            <button id="preset-coral">Coral</button>
            <button id="preset-mitosis">Mitosis</button>
            <button id="preset-maze">Maze</button>
            <button id="preset-spots">Spots</button>
            <button id="preset-clear">Clear</button>
          </div>
        </div>
        <div class="instructions">
          <p>Click and drag on the canvas to paint chemical food.</p>
        </div>
      </div>
    </div>
  </body>
</html>
