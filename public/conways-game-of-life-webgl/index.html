<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Conway's Game of Life WebGL</title>
  <link rel="stylesheet" href="/public/index.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <canvas id="glcanvas"></canvas>

    <div id="ui-panel">
      <div class="header">
        <h1>Conway's Game of Life</h1>
        <div class="subtitle">WebGL Accelerated</div>
      </div>

      <div class="control-group">
        <h3>Simulation</h3>
        <div class="button-row">
          <button id="btn-play">Play</button>
          <button id="btn-pause" class="active">Pause</button>
          <button id="btn-step">Step</button>
        </div>
      </div>

      <div class="control-group">
        <h3>Speed</h3>
        <input type="range" id="slider-speed" min="1" max="60" value="15">
      </div>

      <div class="control-group">
        <h3>Tools</h3>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="pan">Pan</button>
          <button class="tool-btn" data-tool="cell">Cell</button>
          <button class="tool-btn" data-tool="glider">Glider</button>
          <button class="tool-btn" data-tool="gun">Gosper Gun</button>
        </div>
      </div>

      <div class="control-group actions">
        <button id="btn-clear" class="danger">Clear Canvas</button>
      </div>
    </div>
  </div>

  <!-- Shaders -->
  <script type="x-shader/x-vertex" id="vertex-shader">
    attribute vec2 a_position;
    varying vec2 v_texCoord;
    void main() {
      v_texCoord = a_position * 0.5 + 0.5;
      gl_Position = vec4(a_position, 0.0, 1.0);
    }
  </script>

  <script type="x-shader/x-fragment" id="simulation-shader">
    precision mediump float;
    uniform sampler2D u_state;
    uniform vec2 u_resolution;
    varying vec2 v_texCoord;

    int get(int x, int y) {
      vec2 coord = v_texCoord + vec2(x, y) / u_resolution;

      // Wrap around (torus topology)
      if (coord.x < 0.0) coord.x += 1.0;
      if (coord.x > 1.0) coord.x -= 1.0;
      if (coord.y < 0.0) coord.y += 1.0;
      if (coord.y > 1.0) coord.y -= 1.0;

      float val = texture2D(u_state, coord).r;
      return val > 0.5 ? 1 : 0;
    }

    void main() {
      int sum = get(-1, -1) + get(0, -1) + get(1, -1) +
                get(-1,  0) +              get(1,  0) +
                get(-1,  1) + get(0,  1) + get(1,  1);

      int current = get(0, 0);
      float nextState = 0.0;

      if (current == 1 && (sum == 2 || sum == 3)) {
        nextState = 1.0;
      } else if (current == 0 && sum == 3) {
        nextState = 1.0;
      }

      gl_FragColor = vec4(nextState, nextState, nextState, 1.0);
    }
  </script>

  <script type="x-shader/x-fragment" id="display-shader">
    precision mediump float;
    uniform sampler2D u_state;
    uniform vec2 u_offset;
    uniform float u_zoom;
    uniform vec2 u_resolution;
    varying vec2 v_texCoord;

    void main() {
      // Calculate screen aspect ratio
      float aspect = u_resolution.x / u_resolution.y;

      vec2 uv = (v_texCoord - 0.5);

      // Keep cells square regardless of screen aspect
      if (aspect > 1.0) {
          uv.x *= aspect;
      } else {
          uv.y /= aspect;
      }

      // Apply zoom and offset
      uv = uv / u_zoom - u_offset;

      // Map back to 0-1 range for texture lookup
      uv = uv + 0.5;

      // Wrap texture coordinates
      vec2 texCoord = fract(uv);

      // Interpolation introduces artifacts, using point sampling in js but just in case
      float val = texture2D(u_state, texCoord).r;

      // Draw grid lines
      vec2 gridUv = fract(uv * 1024.0);
      float lineThickness = 0.05 * u_zoom;
      float gridLine = 0.0;

      if (u_zoom > 10.0) {
         if (gridUv.x < lineThickness || gridUv.y < lineThickness) {
            gridLine = 0.1;
         }
      }

      // Neon green hacker theme
      vec3 cellColor = vec3(0.1, 1.0, 0.2);
      vec3 bgColor = vec3(0.02, 0.05, 0.02);

      vec3 finalColor = mix(bgColor + gridLine, cellColor, val);

      gl_FragColor = vec4(finalColor, 1.0);
    }
  </script>

  <script src="script.js" type="module"></script>
</body>
</html>
