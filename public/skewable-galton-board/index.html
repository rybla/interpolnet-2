<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Skewable Galton Board</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="demo-container">
      <canvas id="simulation-canvas"></canvas>

      <div class="ui-overlay">
        <header>
          <h1>Skewable Galton Board</h1>
          <p>Adjust the probability of bouncing right to skew the distribution.</p>
        </header>

        <div class="controls">
          <div class="control-group">
            <label for="skew-slider">
              P(Right Bounce) = <span id="skew-value">0.50</span>
            </label>
            <input
              type="range"
              id="skew-slider"
              min="0.01"
              max="0.99"
              step="0.01"
              value="0.50"
            />
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
