<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Modular Arithmetic Clock</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <div class="control-panel">
        <h1>Modular Arithmetic Clock</h1>

        <div class="control-group">
          <label for="modulus">Modulus (N): <span id="modulus-val">12</span></label>
          <input type="range" id="modulus" min="2" max="24" value="12">
        </div>

        <div class="control-group">
          <label for="operand-a">Operand A: <span id="operand-a-val">3</span></label>
          <input type="range" id="operand-a" min="0" max="11" value="3">
        </div>

        <div class="control-group">
          <label for="operand-b">Operand B: <span id="operand-b-val">5</span></label>
          <input type="range" id="operand-b" min="0" max="11" value="5">
        </div>

        <div class="control-group operation-toggle">
          <label>Operation:</label>
          <div class="toggle-buttons">
            <button id="btn-add" class="active">Addition (+)</button>
            <button id="btn-multiply">Multiplication (&times;)</button>
          </div>
        </div>

        <div class="readout-panel">
          <div class="equation">
            <span id="eq-a" class="val-a">3</span>
            <span id="eq-op">+</span>
            <span id="eq-b" class="val-b">5</span>
            <span>&equiv;</span>
            <span id="eq-res" class="val-res">8</span>
          </div>
          <div class="mod-label">mod <span id="eq-n">12</span></div>
        </div>
      </div>

      <div class="canvas-container">
        <canvas id="clock-canvas"></canvas>
      </div>
    </div>
  </body>
</html>
