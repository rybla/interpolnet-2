<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dependency Injection Plumbing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>DI Plumbing</h1>
      <p>Interactive dependency injection visualizer. Route the required services from the Injector to the Components.</p>
    </header>

    <main class="network-container" id="network-container">
      <!-- SVG for Pipes -->
      <svg class="pipes-svg" xmlns="http://www.w3.org/2000/svg" id="pipes-svg"></svg>

      <!-- The Injector (DI Container) -->
      <div class="module injector" id="injector">
        <div class="module-header">
          <h2>DI Injector</h2>
          <span class="status-indicator active"></span>
        </div>
        <div class="services">
          <div class="service" data-service="database">
            <span class="service-name">Database</span>
            <div class="valve-container">
              <button class="valve" data-valve-for="database" aria-label="Toggle Database flow">
                <span class="valve-handle"></span>
              </button>
            </div>
            <div class="port output-port db-out" data-port="db-out"></div>
          </div>

          <div class="service" data-service="logger">
            <span class="service-name">Logger</span>
            <div class="valve-container">
              <button class="valve" data-valve-for="logger" aria-label="Toggle Logger flow">
                <span class="valve-handle"></span>
              </button>
            </div>
            <div class="port output-port log-out" data-port="log-out"></div>
          </div>

          <div class="service" data-service="auth">
            <span class="service-name">Auth</span>
            <div class="valve-container">
              <button class="valve" data-valve-for="auth" aria-label="Toggle Auth flow">
                <span class="valve-handle"></span>
              </button>
            </div>
            <div class="port output-port auth-out" data-port="auth-out"></div>
          </div>
        </div>
      </div>

      <!-- Components -->
      <div class="components-column">

        <!-- Component 1: User Controller -->
        <div class="module component" id="user-controller" data-requires="database,logger">
          <div class="module-header">
            <h2>User Controller</h2>
            <span class="status-indicator"></span>
          </div>
          <div class="requirements">
            <div class="requirement-slot db-slot">
              <div class="port input-port db-in-1" data-port="db-in-1"></div>
              <span class="slot-label">DB</span>
            </div>
            <div class="requirement-slot log-slot">
              <div class="port input-port log-in-1" data-port="log-in-1"></div>
              <span class="slot-label">Log</span>
            </div>
          </div>
          <div class="component-body">
            <div class="data-pulse"></div>
            <p>Waiting for dependencies...</p>
          </div>
        </div>

        <!-- Component 2: Payment Service -->
        <div class="module component" id="payment-service" data-requires="database,auth">
          <div class="module-header">
            <h2>Payment Service</h2>
            <span class="status-indicator"></span>
          </div>
          <div class="requirements">
            <div class="requirement-slot db-slot">
              <div class="port input-port db-in-2" data-port="db-in-2"></div>
              <span class="slot-label">DB</span>
            </div>
            <div class="requirement-slot auth-slot">
              <div class="port input-port auth-in-1" data-port="auth-in-1"></div>
              <span class="slot-label">Auth</span>
            </div>
          </div>
          <div class="component-body">
            <div class="data-pulse"></div>
            <p>Waiting for dependencies...</p>
          </div>
        </div>

      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
