<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Derivative Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="container">
      <canvas id="math-canvas"></canvas>
      <div id="ui-overlay">
        <h1>Derivative Visualizer</h1>
        <p class="description">Slide the anchor points closer together along the curve to see the secant line transition into the tangent line.</p>

        <div class="math-panel">
          <div class="stat-row">
            <span class="label">Function:</span>
            <span class="value" id="function-display">f(x) = x³ - 3x</span>
          </div>
          <div class="stat-row point-row" id="p1-row">
            <span class="label">Point 1 (x₁, y₁):</span>
            <span class="value" id="p1-display">(0.00, 0.00)</span>
          </div>
          <div class="stat-row point-row" id="p2-row">
            <span class="label">Point 2 (x₂, y₂):</span>
            <span class="value" id="p2-display">(0.00, 0.00)</span>
          </div>

          <hr class="divider">

          <div class="stat-row highlight">
            <span class="label" id="slope-label">Secant Slope (m):</span>
            <span class="value" id="slope-display">0.00</span>
          </div>
          <div class="stat-row">
            <span class="label" id="equation-label">Secant Equation:</span>
            <span class="value" id="equation-display">y = 0x + 0</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
