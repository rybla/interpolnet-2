<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Marching Cubes Isosurface</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-panel">
      <h1>Marching Cubes Isosurface</h1>
      <p>Adjust the threshold to generate a cohesive polygonal mesh from the scalar field.</p>
      <div class="slider-container">
        <label for="threshold">Threshold:</label>
        <input type="range" id="threshold" min="0" max="1" step="0.01" value="0.5">
        <span id="threshold-value">0.5</span>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/MarchingCubes.js"></script>
  </body>
</html>
