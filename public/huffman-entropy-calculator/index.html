<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Huffman Entropy Calculator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>Huffman Entropy Calculator</h1>
            <p>Type below to visually compress text using a dynamically generated Huffman coding tree.</p>
        </header>

        <main>
            <section class="panel input-panel">
                <label for="text-input">Input Text</label>
                <textarea id="text-input" placeholder="Enter text here..."></textarea>

                <div class="metrics">
                    <div class="metric-card">
                        <span class="metric-label">Entropy (Shannon)</span>
                        <span class="metric-value" id="entropy-val">0.00</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Original Size (8-bit)</span>
                        <span class="metric-value" id="original-size">0 bits</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Compressed Size</span>
                        <span class="metric-value" id="compressed-size">0 bits</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Compression Ratio</span>
                        <span class="metric-value" id="compression-ratio">1.00x</span>
                    </div>
                </div>
            </section>

            <section class="panel table-panel">
                <div class="table-container">
                    <table id="freq-table">
                        <thead>
                            <tr>
                                <th>Char</th>
                                <th>Freq</th>
                                <th>Code</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Table rows will be inserted here dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="panel visualization-panel">
                <div class="canvas-container">
                    <!-- The SVG will act as our visualization area for the tree -->
                    <svg id="tree-svg"></svg>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
