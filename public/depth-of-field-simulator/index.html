<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Depth of Field Simulator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="ui-container">
      <h1>Depth of Field Simulator</h1>
      <p>Simulate a camera lens by calculating a focal plane and intentionally blurring objects based on their z-depth distance from the circle of confusion.</p>

      <div class="control-group">
        <label for="focus-distance">Focus Distance</label>
        <div class="slider-container">
          <input type="range" id="focus-distance" min="0" max="100" step="1" value="50">
          <span id="focus-distance-value">50</span>
        </div>
      </div>

      <div class="control-group">
        <label for="aperture">Aperture (F-Stop)</label>
        <div class="slider-container">
          <input type="range" id="aperture" min="0.0001" max="0.05" step="0.001" value="0.01">
          <span id="aperture-value">0.01</span>
        </div>
      </div>

      <div class="control-group">
        <label for="focal-length">Focal Length</label>
        <div class="slider-container">
          <input type="range" id="focal-length" min="10" max="200" step="1" value="50">
          <span id="focal-length-value">50</span>
        </div>
      </div>
    </div>
    <div id="canvas-container"></div>
  </body>
</html>
