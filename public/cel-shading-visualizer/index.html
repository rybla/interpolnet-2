<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Cel Shading Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <!-- Three.js from the requested CDN -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./script.js" defer></script>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-overlay">
      <div class="panel">
        <h1>Cel Shading Visualizer</h1>
        <p>Adjust the slider to snap smooth lighting into sharp color bands using an interactive 1D step texture.</p>

        <div class="control-group">
          <label for="steps-slider">Color Bands (Steps): <span id="steps-value">4</span></label>
          <input type="range" id="steps-slider" min="2" max="10" value="4" step="1" />
        </div>

        <div class="control-group">
          <label for="light-slider">Light Rotation: <span id="light-value">0&deg;</span></label>
          <input type="range" id="light-slider" min="-180" max="180" value="0" step="1" />
        </div>

        <div class="gradient-map-container">
          <label>1D Texture Map Representation:</label>
          <canvas id="gradient-canvas" width="256" height="20"></canvas>
        </div>
      </div>
    </div>
  </body>
</html>
