<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Grid-Based Fluid Solver</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="simulation-container">
      <canvas id="fluid-canvas"></canvas>

      <div id="control-panel" class="control-panel">
        <div class="control-group">
          <label for="color-picker">Dye Color</label>
          <input type="color" id="color-picker" value="#00ffff" />
        </div>

        <div class="control-group">
          <label for="brush-size">Brush Radius</label>
          <input type="range" id="brush-size" min="1" max="10" value="3" />
        </div>

        <div class="control-group">
          <label for="viscosity">Viscosity</label>
          <input type="range" id="viscosity" min="0" max="0.001" step="0.0001" value="0.0001" />
        </div>

        <div class="control-group">
          <label for="diffusion">Diffusion Rate</label>
          <input type="range" id="diffusion" min="0" max="0.001" step="0.0001" value="0.0001" />
        </div>

        <div class="control-group">
          <label for="fading">Dye Fading</label>
          <input type="range" id="fading" min="0" max="0.1" step="0.01" value="0.02" />
        </div>

        <div class="control-group">
          <button id="clear-button">Clear Fluid</button>
        </div>
      </div>
    </main>
  </body>
</html>
