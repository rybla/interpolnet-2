<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Simple Harmonic Motion</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="demo-container">
      <div class="controls-panel">
        <h1>Simple Harmonic Motion</h1>
        <p>A 1D projection of uniform circular motion.</p>

        <div class="control-group">
          <label for="amplitude-slider">Amplitude (Radius)</label>
          <div class="slider-wrapper">
            <input type="range" id="amplitude-slider" min="50" max="250" value="150" step="1">
            <span id="amplitude-value" class="value-display">150</span>
          </div>
        </div>

        <div class="control-group">
          <label for="frequency-slider">Frequency (Speed)</label>
          <div class="slider-wrapper">
            <input type="range" id="frequency-slider" min="0.1" max="5.0" value="1.0" step="0.1">
            <span id="frequency-value" class="value-display">1.0</span>
          </div>
        </div>

        <button id="toggle-play" class="btn active">Pause</button>
      </div>

      <div class="canvas-container">
        <canvas id="simulation-canvas"></canvas>
      </div>
    </main>
  </body>
</html>
