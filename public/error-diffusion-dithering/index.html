<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Error Diffusion Dithering Comparison</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="control-panel">
      <h1>Dithering Comparison</h1>
      <div class="controls">
        <label for="algorithm-select">Algorithm:</label>
        <select id="algorithm-select">
          <option value="floyd-steinberg">Floyd-Steinberg</option>
          <option value="atkinson">Atkinson</option>
          <option value="jarvis-judice-ninke">Jarvis-Judice-Ninke</option>
        </select>
      </div>
      <p class="description">Drag the slider across the image to compare the original high-resolution image with the 1-bit dithered version.</p>
    </header>

    <main class="main-view">
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="canvas-original"></canvas>
        <canvas id="canvas-dithered"></canvas>
        <div class="slider" id="split-slider">
          <div class="slider-handle"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js" type="module"></script>
</body>
</html>
