<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Skewed Galton Board</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Skewed Galton Board</h1>
        <p>Adjust the probability of balls falling right at each peg.</p>
      </header>
      <main>
        <div class="controls">
          <div class="slider-container">
            <label for="skew-slider">
              Probability of going right: <span id="prob-value">0.50</span>
            </label>
            <input type="range" id="skew-slider" min="0" max="1" step="0.01" value="0.5" />
          </div>
          <button id="reset-button">Reset</button>
        </div>
        <div class="canvas-container">
          <canvas id="galton-canvas"></canvas>
        </div>
      </main>
    </div>
  </body>
</html>
