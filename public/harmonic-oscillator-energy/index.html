<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Harmonic Oscillator Energy</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="panel simulation-panel">
        <h2>Simulation</h2>
        <canvas id="simCanvas" width="400" height="400"></canvas>
      </div>

      <div class="panel graph-panel">
        <h2>Energy Over Time</h2>
        <canvas id="graphCanvas" width="500" height="400"></canvas>
        <div class="legend">
          <span class="legend-item" style="color: cyan;">■ Kinetic (KE)</span>
          <span class="legend-item" style="color: magenta;">■ Potential (PE)</span>
          <span class="legend-item" style="color: yellow;">■ Total (TE)</span>
        </div>
      </div>

      <div class="panel controls-panel">
        <h2>Parameters</h2>
        <div class="control-group">
          <label for="massSlider">Mass ($m$): <span id="massVal">10</span></label>
          <input type="range" id="massSlider" min="1" max="50" step="1" value="10">
        </div>
        <div class="control-group">
          <label for="kSlider">Spring Constant ($k$): <span id="kVal">0.1</span></label>
          <input type="range" id="kSlider" min="0.01" max="0.5" step="0.01" value="0.1">
        </div>
        <div class="control-group">
          <label for="cSlider">Damping ($c$): <span id="cVal">0.05</span></label>
          <input type="range" id="cSlider" min="0" max="0.5" step="0.01" value="0.05">
        </div>
        <button id="resetBtn">Reset</button>
      </div>
    </div>
  </body>
</html>
