<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Perlin Noise Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Perlin Noise Visualizer</h1>
        <p>Explore how 2D Perlin noise is generated by visualizing the underlying gradient vectors and bilinear interpolation.</p>
      </header>

      <main>
        <div class="canvas-container">
          <canvas id="noise-canvas"></canvas>
        </div>

        <aside class="controls">
          <div class="control-group">
            <label for="grid-size">Grid Resolution (Frequency)</label>
            <input type="range" id="grid-size" min="2" max="16" value="6" step="1">
            <span id="grid-size-val">6</span>
          </div>

          <div class="control-group">
            <label class="toggle-label">
              <input type="checkbox" id="show-noise" checked>
              Show Interpolated Noise
            </label>
          </div>

          <div class="control-group">
            <label class="toggle-label">
              <input type="checkbox" id="show-gradients" checked>
              Show Gradient Vectors
            </label>
          </div>

          <div class="control-group">
            <label class="toggle-label">
              <input type="checkbox" id="show-grid" checked>
              Show Grid Lines
            </label>
          </div>

          <div class="control-group">
            <button id="regenerate-btn">Regenerate Gradients</button>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
