<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Homeomorphism Visualizer</title>
    <link rel="stylesheet" href="./style.css" />

    <!-- Load Three.js and OrbitControls -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./script.js"></script>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-overlay">
      <div class="panel">
        <h1>Homeomorphism Visualizer</h1>
        <p>A continuous topological deformation showing how a coffee mug is homeomorphic to a donut (torus).</p>

        <div class="control-group">
          <label for="morph-slider">Morphing Progress: <span id="morph-value">0%</span></label>
          <input type="range" id="morph-slider" min="0" max="1" step="0.001" value="0">
          <div class="slider-labels">
            <span>Coffee Mug</span>
            <span>Donut</span>
          </div>
        </div>

        <div class="control-group">
          <label class="checkbox-label">
            <input type="checkbox" id="wireframe-toggle">
            Show Wireframe
          </label>
        </div>

        <div class="instructions">
          <p><em>Interact:</em> Click and drag to rotate the camera. Scroll to zoom.</p>
        </div>
      </div>
    </div>
  </body>
</html>
