<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Voxelizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <div id="ui-container">
      <h1>Voxelizer</h1>
      <p>Convert a high-poly 3D model into an increasingly blocky Minecraft-style voxel grid.</p>

      <div class="control-group">
        <label for="voxel-size">Voxel Size / Blockiness</label>
        <div class="slider-container">
          <input type="range" id="voxel-size" min="0.5" max="5.0" step="0.1" value="1.0">
          <span id="voxel-size-value">1.0</span>
        </div>
      </div>
    </div>
    <div id="canvas-container"></div>
  </body>
</html>
