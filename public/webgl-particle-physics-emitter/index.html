<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | WebGL Particle Physics Emitter</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container">
        <canvas id="webgl-canvas"></canvas>
      </div>
      <div id="controls-panel">
        <div class="panel-header">
          <h1>WebGL Particle Physics</h1>
          <p>Tweak force vectors applied to the particle emitter.</p>
        </div>

        <div class="control-group">
          <label for="wind-x">Wind X: <span id="wind-x-val">0.0</span></label>
          <input type="range" id="wind-x" min="-50" max="50" value="0" step="0.1">
        </div>

        <div class="control-group">
          <label for="wind-y">Wind Y: <span id="wind-y-val">0.0</span></label>
          <input type="range" id="wind-y" min="-50" max="50" value="0" step="0.1">
        </div>

        <div class="control-group">
          <label for="gravity">Gravity (Y): <span id="gravity-val">-9.8</span></label>
          <input type="range" id="gravity" min="-50" max="50" value="-9.8" step="0.1">
        </div>

        <div class="control-group">
          <label for="drag">Drag Coefficient: <span id="drag-val">0.01</span></label>
          <input type="range" id="drag" min="0" max="0.1" value="0.01" step="0.001">
        </div>

        <div class="control-group">
          <label for="particle-count">Particle Count: <span id="count-val">10000</span></label>
          <input type="range" id="particle-count" min="1000" max="100000" value="10000" step="1000">
        </div>

        <div class="stats">
          <p>FPS: <span id="fps-val">0</span></p>
        </div>
      </div>
    </div>
  </body>
</html>
