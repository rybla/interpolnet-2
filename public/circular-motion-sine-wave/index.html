<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Circular Motion Sine Wave</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="container">
      <canvas id="canvas"></canvas>
      <div id="controls">
        <div class="control-group">
          <label for="amplitude">Amplitude (Radius)</label>
          <input type="range" id="amplitude" min="10" max="250" value="100" />
        </div>
        <div class="control-group">
          <label for="frequency">Frequency (Speed)</label>
          <input type="range" id="frequency" min="0.01" max="0.2" step="0.01" value="0.05" />
        </div>
        <div class="control-group checkbox-group">
          <input type="checkbox" id="traceToggle" checked />
          <label for="traceToggle">Show Trace</label>
        </div>
      </div>
    </div>
  </body>
</html>
