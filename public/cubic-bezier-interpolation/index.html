<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Cubic Bezier Curve Interpolation</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>

    <div id="container">
      <canvas id="canvas"></canvas>
      <div id="controls">
        <h2>Cubic Bezier Curve Interpolation</h2>
        <p>Interactive visualization revealing the recursive linear interpolations (De Casteljau's algorithm) that construct a cubic Bézier curve.</p>
        <div class="control-row">
          <button id="play-pause-btn">Play</button>
        </div>
        <div class="control-row">
          <label for="time-slider">t = <span id="time-value">0.00</span></label>
          <input type="range" id="time-slider" min="0" max="1" step="0.001" value="0">
        </div>
        <div class="legend">
          <div class="legend-item"><span class="color-box p03"></span> Control Polygon</div>
          <div class="legend-item"><span class="color-box l1"></span> 1st Level Scaffolding</div>
          <div class="legend-item"><span class="color-box l2"></span> 2nd Level Scaffolding</div>
          <div class="legend-item"><span class="color-box curve"></span> Final Curve</div>
        </div>
      </div>
    </div>

  </body>
</html>
