<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | 3D Facial Expression Morphing</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-overlay">
      <div class="panel">
        <h1>3D Facial Expression Morphing</h1>
        <p>
          Drag the slider to interpolate the facial expression seamlessly between a neutral state and a full smile.
        </p>
        <div class="controls">
          <div class="control-row">
            <label for="morph-weight">Morph Weight (Smile):</label>
            <input type="range" id="morph-weight" min="0" max="1" step="0.01" value="0">
            <span id="morph-weight-value">0.00</span>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </body>
</html>
