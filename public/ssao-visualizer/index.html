<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Screen Space Ambient Occlusion</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./script.js" defer></script>
    <div id="ui-panel">
      <h1>SSAO Visualizer</h1>
      <p>Click on the geometry to cast hemispherical test rays and calculate local ambient occlusion.</p>
      <div id="occlusion-result" class="hidden">
        <div>Ambient Occlusion Factor: <span id="ao-value">0.00</span></div>
        <div class="legend">
          <span class="unblocked-legend">Unblocked Rays (<span id="unblocked-count">0</span>)</span> |
          <span class="blocked-legend">Blocked Rays (<span id="blocked-count">0</span>)</span>
        </div>
      </div>
    </div>
    <div id="canvas-container"></div>
  </body>
</html>
