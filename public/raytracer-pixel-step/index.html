<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Raytracer Pixel Step</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <div class="canvas-container">
        <canvas id="raytracer-canvas"></canvas>
      </div>
      <div class="control-panel">
        <div class="title-container">
          <h1>Raytracer Pixel Step</h1>
          <button id="reset-scene-btn" class="secondary-btn" title="Reset Scene">↺</button>
        </div>
        <div class="step-indicator">
          <span id="step-label" class="badge">Step 1/7</span>
          <h2 id="step-title">Camera & Ray Origin</h2>
        </div>
        <p id="step-description">The raytracer starts at the virtual camera's origin, pointing towards a specific pixel on the screen.</p>

        <div class="controls-action">
          <button id="prev-step-btn" class="nav-btn" disabled>Previous</button>
          <button id="next-step-btn" class="action-btn">Next Step</button>
        </div>

        <div class="legend">
          <h3>Legend (Drag Objects)</h3>
          <ul>
            <li><span class="swatch cam"></span> Camera (Origin)</li>
            <li><span class="swatch target"></span> Target Object</li>
            <li><span class="swatch occluder"></span> Occluder Object</li>
            <li><span class="swatch light"></span> Light Source</li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
