<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Barycentric Triangle Rasterizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main>
      <div id="canvas-container">
        <canvas id="rasterizerCanvas"></canvas>
      </div>
      <div id="control-panel">
        <h1>Barycentric Triangle Rasterizer</h1>
        <p>Show the barycentric coordinate rasterization process by filling in a massive 2D triangle pixel-by-pixel to calculate color gradients.</p>
        <div class="controls">
          <button id="playPauseBtn">Play</button>
          <button id="resetBtn">Reset</button>
          <div class="slider-group">
            <label for="speedSlider">Speed</label>
            <input type="range" id="speedSlider" min="1" max="10000" value="500">
          </div>
          <div class="info">
            <p>Rasterizing pixel: <span id="currentPixel">-</span></p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
