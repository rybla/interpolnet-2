<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Ising Model Simulator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main>
      <canvas id="simulation-canvas"></canvas>
      <div id="control-panel">
        <h1>Ising Model Simulator</h1>
        <p>Control the temperature to observe how magnetic spins align, causing a phase transition between an ordered and disordered state.</p>
        <div class="control-group">
          <label for="temperature-slider">Temperature (T): <span id="temperature-value">2.27</span></label>
          <input type="range" id="temperature-slider" min="0.1" max="5.0" step="0.01" value="2.27" />
        </div>
      </div>
    </main>
  </body>
</html>
