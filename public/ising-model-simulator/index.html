<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Ising Model Simulator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="demo-container">
      <div class="canvas-container">
        <canvas id="simulation-canvas"></canvas>
      </div>
      <aside class="control-panel">
        <h1>Ising Model Simulator</h1>
        <p class="description">
          Visualize atomic ferromagnetism with a grid of flipping binary spins that naturally align into domains and exhibit a sudden phase transition at the Curie temperature.
        </p>

        <div class="control-group">
          <label for="temperature-slider">Temperature: <span id="temperature-value">2.27</span></label>
          <input type="range" id="temperature-slider" min="0.1" max="5.0" step="0.01" value="2.27">
        </div>

        <div class="control-group">
          <button id="play-pause-btn" class="active">Pause</button>
          <button id="reset-btn">Reset</button>
        </div>

        <div class="stats">
          <p>Magnetization: <span id="magnetization-value">0.00</span></p>
        </div>
      </aside>
    </main>
  </body>
</html>
