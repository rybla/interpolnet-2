<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galton Board Visualizer</title>
  <link rel="stylesheet" href="/index.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <div class="header">
      <h1>Galton Board Visualizer</h1>
      <p>Watch as physical balls fall through a peg maze to form a normal distribution, visually calculating binomial coefficients.</p>
    </div>

    <div class="controls-panel">
      <div class="control-group">
        <label for="rows-slider">Peg Rows: <span id="rows-value">12</span></label>
        <input type="range" id="rows-slider" min="5" max="25" value="12">
      </div>
      <div class="control-group">
        <label for="speed-slider">Drop Speed: <span id="speed-value">Fast</span></label>
        <input type="range" id="speed-slider" min="1" max="100" value="70">
      </div>
      <div class="control-actions">
        <button id="btn-toggle" class="btn primary">Pause</button>
        <button id="btn-reset" class="btn secondary">Reset</button>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="galton-canvas"></canvas>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
