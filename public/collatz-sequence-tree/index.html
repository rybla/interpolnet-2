<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Collatz Sequence Tree</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <canvas id="tree-canvas"></canvas>
      <div id="ui-container">
        <h1 class="title">Collatz Sequence Tree</h1>
        <form id="collatz-form">
          <label for="number-input">Starting Number:</label>
          <input type="number" id="number-input" min="1" value="27" required />
          <button type="submit" id="generate-btn">Generate</button>
        </form>
        <div id="status-panel">
          <p>Sequence Length: <span id="seq-length">-</span></p>
          <p>Max Value: <span id="seq-max">-</span></p>
        </div>
      </div>
    </div>
  </body>
</html>
