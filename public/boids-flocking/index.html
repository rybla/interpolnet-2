<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Boids Flocking Simulation</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Boids Flocking Simulation</h1>
        <p>
          Simulate emergent flocking behavior by adjusting the weights of Craig
          Reynolds' core rules.
        </p>
      </header>
      <main>
        <div class="canvas-container">
          <canvas id="boidsCanvas"></canvas>
        </div>
        <aside class="controls">
          <div class="control-group">
            <label for="separationWeight">Separation</label>
            <input type="range" id="separationWeight" min="0" max="5" step="0.1" value="1.5" />
            <span id="separationValue">1.5</span>
          </div>
          <div class="control-group">
            <label for="alignmentWeight">Alignment</label>
            <input type="range" id="alignmentWeight" min="0" max="5" step="0.1" value="1.0" />
            <span id="alignmentValue">1.0</span>
          </div>
          <div class="control-group">
            <label for="cohesionWeight">Cohesion</label>
            <input type="range" id="cohesionWeight" min="0" max="5" step="0.1" value="1.0" />
            <span id="cohesionValue">1.0</span>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
