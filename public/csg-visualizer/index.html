<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Constructive Solid Geometry Visualizer</title>
    <link rel="stylesheet" href="./style.css" />

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.3/build/index.module.js",
          "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
        }
      }
    </script>
    <script type="module" src="./script.js" defer></script>
  </head>
  <body>
    <div id="ui-panel">
      <h1>CSG Visualizer</h1>
      <p>Drag the shapes and see boolean operations in real-time.</p>

      <div class="control-group">
        <label>Operation:</label>
        <div class="radio-group">
          <label><input type="radio" name="operation" value="SUBTRACTION" checked> Subtraction</label>
          <label><input type="radio" name="operation" value="INTERSECTION"> Intersection</label>
          <label><input type="radio" name="operation" value="ADDITION"> Union</label>
        </div>
      </div>

      <div class="control-group">
        <label>Display:</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="show-wireframe"> Show Wireframe</label>
          <label><input type="checkbox" id="show-base-shapes" checked> Show Base Shapes</label>
        </div>
      </div>
    </div>

    <div id="canvas-container"></div>
  </body>
</html>
