<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Fibonacci Golden Spiral</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <canvas id="canvas"></canvas>
      <div id="controls-overlay">
        <div class="control-group">
          <label for="speedSlider">Speed</label>
          <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
        </div>
        <div class="control-group">
          <button id="playPauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
        </div>
        <div class="control-group">
          <button id="stepBackBtn">Step Back</button>
          <button id="stepForwardBtn">Step Forward</button>
        </div>
        <div class="stats">
          <div>Current Fibonacci: <span id="currentFib">1</span></div>
          <div>Iteration: <span id="iterationCount">0</span></div>
        </div>
      </div>
    </div>
  </body>
</html>
