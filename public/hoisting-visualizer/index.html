<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoisting Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Hoisting Visualizer</h1>
            <p>Watch JavaScript variable and function declarations physically lift to the top of the Execution Context.</p>
        </header>

        <main>
            <div class="controls">
                <button id="btn-reset" class="btn secondary">Reset Context</button>
                <button id="btn-animate" class="btn primary">Simulate Engine Parsing (Hoist)</button>
            </div>

            <div class="execution-context" id="execution-context">
                <div class="context-header">Global Execution Context</div>
                <div class="code-container" id="code-container">
                    <!-- Code lines will be dynamically inserted here -->
                </div>
            </div>
        </main>

        <template id="line-template">
            <div class="code-line">
                <span class="line-number"></span>
                <div class="code-content"></div>
            </div>
        </template>
    </div>

    <script src="script.js"></script>
</body>
</html>
