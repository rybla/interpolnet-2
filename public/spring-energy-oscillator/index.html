<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Spring Energy Oscillator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="sim-container">
        <canvas id="simCanvas"></canvas>
      </div>
      <div class="right-panel">
        <div class="graph-container">
          <canvas id="graphCanvas"></canvas>
          <div class="graph-legend">
            <div class="legend-item"><div class="legend-color color-kinetic"></div>Kinetic Energy</div>
            <div class="legend-item"><div class="legend-color color-potential"></div>Potential Energy</div>
            <div class="legend-item"><div class="legend-color color-total"></div>Total Energy</div>
          </div>
        </div>
        <div class="controls">
          <div class="control-group">
            <label for="massInput">Mass (m): <span id="massVal">10</span></label>
            <input type="range" id="massInput" min="1" max="50" value="10" step="1" />
          </div>
          <div class="control-group">
            <label for="springInput">Spring Constant (k): <span id="springVal">0.1</span></label>
            <input type="range" id="springInput" min="0.01" max="1" value="0.1" step="0.01" />
          </div>
          <div class="control-group">
            <label for="dampingInput">Damping (c): <span id="dampingVal">0.05</span></label>
            <input type="range" id="dampingInput" min="0" max="0.5" value="0.05" step="0.01" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
