<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Marching Cubes Isosurface Mesh</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-panel">
      <h1>Marching Cubes Isosurface Mesh</h1>
      <p>Adjust threshold to extract an isosurface from a 3D scalar field (metaballs).</p>
      <div class="control-group">
        <label for="thresholdSlider">Threshold: <span id="thresholdValue">0.5</span></label>
        <input type="range" id="thresholdSlider" min="0" max="1" step="0.01" value="0.5">
      </div>
      <div class="control-group buttons">
        <button id="wireframeBtn">Toggle Wireframe</button>
        <button id="gridBtn">Toggle Grid Points</button>
      </div>
    </div>
  </body>
</html>
