<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Shadow Mapping Deconstructed</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./script.js" defer></script>
  </head>
  <body>
    <!-- Import maps polyfill -->
    <!-- Remove this when import maps will be widely supported -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <div id="app">
      <div id="split-container">
        <div id="camera-view" class="view-panel">
          <div class="view-label">Camera Perspective (Shadow Map)</div>
          <canvas id="camera-canvas"></canvas>
        </div>
        <div id="light-view" class="view-panel">
          <div class="view-label">Light Perspective (Depth Map)</div>
          <canvas id="light-canvas"></canvas>
        </div>
      </div>
      <div id="instructions">
        <h2>Shadow Mapping Deconstructed</h2>
        <p>Drag on the screen to rotate the light source around the scene.</p>
        <p>Observe how the depth map perfectly correlates with the cast shadows.</p>
      </div>
    </div>
  </body>
</html>
