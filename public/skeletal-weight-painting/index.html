<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Skeletal Animation Weight Painting Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="container">
      <div id="canvas-container"></div>
      <div id="controls-panel">
        <h2>Skeletal Weight Visualizer</h2>

        <div class="control-group">
          <label>Select Bone:</label>
          <div class="radio-group" id="bone-selection">
            <label><input type="radio" name="bone" value="-1" checked> None (Solid Color)</label>
            <label><input type="radio" name="bone" value="0"> Bone 0 (Base)</label>
            <label><input type="radio" name="bone" value="1"> Bone 1 (Middle)</label>
            <label><input type="radio" name="bone" value="2"> Bone 2 (Middle)</label>
            <label><input type="radio" name="bone" value="3"> Bone 3 (Tip)</label>
          </div>
        </div>

        <div class="control-group">
          <label for="animation-slider">Animation Frame:</label>
          <input type="range" id="animation-slider" min="0" max="100" value="50">
        </div>

        <div class="control-group">
          <label class="toggle">
            <input type="checkbox" id="show-skeleton" checked> Show Skeleton
          </label>
          <label class="toggle">
            <input type="checkbox" id="wireframe"> Wireframe
          </label>
        </div>
      </div>
    </div>
  </body>
</html>
