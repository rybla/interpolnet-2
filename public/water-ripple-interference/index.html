<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | 2D Water Ripple Interference</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main>
      <canvas id="simulation-canvas"></canvas>
      <div id="control-panel">
        <h2>Interference Controls</h2>

        <div class="control-group">
          <label for="frequency">Frequency</label>
          <input type="range" id="frequency" min="0.1" max="5" step="0.1" value="1" />
          <span id="frequency-val">1.0</span>
        </div>

        <div class="control-group">
          <label for="amplitude">Amplitude</label>
          <input type="range" id="amplitude" min="1" max="100" step="1" value="50" />
          <span id="amplitude-val">50</span>
        </div>

        <div class="control-group">
          <label for="separation">Source Separation</label>
          <input type="range" id="separation" min="0" max="400" step="5" value="100" />
          <span id="separation-val">100</span>
        </div>

        <div class="instructions">
          Drag the point sources on the canvas to manually move them.
        </div>
      </div>
    </main>
  </body>
</html>
