<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Path Tracing vs Ray Tracing</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <div id="controls">
        <h1>Path Tracing vs Ray Tracing</h1>
        <p>Compare deterministic hard shadows with stochastic soft shadows.</p>

        <div class="control-group">
          <label>Mode:</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="mode" value="ray" checked> Ray Tracing
            </label>
            <label>
              <input type="radio" name="mode" value="path"> Path Tracing
            </label>
          </div>
        </div>

        <div class="control-group">
          <label for="light-size">Light Size: <span id="light-size-val">20</span></label>
          <input type="range" id="light-size" min="1" max="100" value="20" />
        </div>

        <div class="control-group">
          <label for="bounces">Max Bounces: <span id="bounces-val">3</span></label>
          <input type="range" id="bounces" min="1" max="10" value="3" />
        </div>

        <div class="control-group">
          <label for="samples-per-frame">Samples per Frame: <span id="samples-per-frame-val">10</span></label>
          <input type="range" id="samples-per-frame" min="1" max="50" value="10" />
        </div>

        <div class="stats">
          <p>Total Samples: <span id="total-samples">0</span></p>
        </div>

        <button id="reset-btn">Reset Render</button>
      </div>

      <div id="canvas-container">
        <canvas id="render-canvas"></canvas>
      </div>
    </div>
  </body>
</html>
