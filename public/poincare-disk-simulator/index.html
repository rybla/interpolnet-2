<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poincaré Disk Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui-container">
        <h1>Poincaré Disk</h1>
        <p>Hyperbolic Geometry Simulator</p>
        <div class="instructions">
            <strong>Draw Lines:</strong> Click and drag inside the disk to draw hyperbolic straight lines (geodesics). Notice how they curve towards the boundary!
        </div>
        <button id="clear-btn">Clear Lines</button>
    </div>

    <div id="canvas-container">
        <canvas id="poincare-canvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
