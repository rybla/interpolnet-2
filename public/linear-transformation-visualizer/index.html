<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Linear Transformation Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Linear Transformation Visualizer</h1>
        <p>Manipulate the 2x2 matrix or drag the basis vectors to dynamically transform the coordinate space.</p>
      </header>

      <main>
        <div class="canvas-container">
          <canvas id="gridCanvas"></canvas>
        </div>

        <div class="controls">
          <section class="matrix-section">
            <h2>Transformation Matrix</h2>
            <div class="matrix-grid">
              <span class="matrix-bracket left-bracket">[</span>
              <div class="matrix-inputs">
                <input type="number" id="m00" step="0.1" value="1" title="i-hat x">
                <input type="number" id="m01" step="0.1" value="0" title="j-hat x">
                <input type="number" id="m10" step="0.1" value="0" title="i-hat y">
                <input type="number" id="m11" step="0.1" value="1" title="j-hat y">
              </div>
              <span class="matrix-bracket right-bracket">]</span>
            </div>
          </section>

          <section class="presets-section">
            <h2>Presets</h2>
            <div class="preset-buttons">
              <button data-preset="identity">Identity</button>
              <button data-preset="shear-x">Shear X</button>
              <button data-preset="shear-y">Shear Y</button>
              <button data-preset="rotate-90">Rotate 90°</button>
              <button data-preset="reflect-x">Reflect X</button>
              <button data-preset="reflect-y">Reflect Y</button>
              <button data-preset="scale-2">Scale 2x</button>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
