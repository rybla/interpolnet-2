<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | CPU Scheduling Simulator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main>
      <header class="control-panel">
        <h1>CPU Scheduling Simulator</h1>
        <div class="controls">
          <div class="control-group">
            <label for="algorithm-select">Algorithm:</label>
            <select id="algorithm-select">
              <option value="rr">Round Robin (RR)</option>
              <option value="sjf">Shortest Job First (SJF)</option>
            </select>
          </div>
          <div class="control-group">
            <label for="quantum-input" id="quantum-label">Time Quantum:</label>
            <input type="range" id="quantum-input" min="1" max="10" value="3" step="1">
            <span id="quantum-value">3</span>
          </div>
          <div class="control-group">
            <label for="speed-input">Simulation Speed:</label>
            <input type="range" id="speed-input" min="0.5" max="5" value="1" step="0.5">
            <span id="speed-value">1x</span>
          </div>
          <div class="button-group">
            <button id="add-process-btn">Add Random Process</button>
            <button id="reset-btn">Reset</button>
          </div>
        </div>
      </header>

      <section class="queue-section">
        <h2>Process Queue</h2>
        <div id="process-queue" class="queue-container">
          <!-- Process blocks will be injected here -->
        </div>
      </section>

      <section class="cpu-section">
        <h2>CPU Timeline</h2>
        <div id="cpu-timeline" class="timeline-container">
          <!-- Timeline blocks will be injected here -->
        </div>
        <div class="time-marker">
          Time: <span id="current-time">0</span>
        </div>
      </section>
    </main>
  </body>
</html>
