<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | L-System Fractal Trees Generator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <div class="control-panel">
        <h1>L-System Fractal Trees Generator</h1>
        <p>An interactive grammar ruleset editor where specific axiomatic string expansions instantly render as branching L-system fractal trees.</p>

        <div class="control-group">
          <label for="axiom">Axiom</label>
          <input type="text" id="axiom" value="F" />
        </div>

        <div class="control-group">
          <div class="rules-header">
            <label>Rules</label>
            <button id="add-rule-btn" class="btn btn-small">+ Add Rule</button>
          </div>
          <div id="rules-container">
            <div class="rule-row">
              <input type="text" class="rule-char" value="F" maxlength="1" />
              <span>&rarr;</span>
              <input type="text" class="rule-replacement" value="FF+[+F-F-F]-[-F+F+F]" />
              <button class="remove-rule-btn btn-danger btn-small">&times;</button>
            </div>
          </div>
        </div>

        <div class="control-group">
          <label for="iterations">Iterations: <span id="iterations-val">3</span></label>
          <input type="range" id="iterations" min="1" max="6" value="3" />
        </div>

        <div class="control-group">
          <label for="angle">Angle: <span id="angle-val">22.5&deg;</span></label>
          <input type="range" id="angle" min="1" max="90" value="22.5" step="0.1" />
        </div>

        <div class="control-group">
          <label for="length">Initial Length: <span id="length-val">10</span></label>
          <input type="range" id="length" min="1" max="100" value="10" />
        </div>

        <div class="control-group">
           <label for="length-factor">Length Scale Factor: <span id="length-factor-val">1</span></label>
           <input type="range" id="length-factor" min="0.1" max="2" value="1" step="0.1" />
        </div>

        <div class="presets-group">
          <label>Presets</label>
          <select id="preset-select">
            <option value="custom">Custom</option>
            <option value="tree1">Fractal Tree</option>
            <option value="weed">Fractal Weed</option>
            <option value="bush">Fractal Bush</option>
            <option value="koch">Koch Curve</option>
            <option value="sierpinski">Sierpinski Triangle</option>
            <option value="dragon">Dragon Curve</option>
          </select>
        </div>

        <div class="string-preview-group">
          <label>Axiomatic String Expansion (<span id="string-length">1</span> chars)</label>
          <div class="string-preview" id="string-preview">F</div>
        </div>
      </div>
      <div class="canvas-container">
        <canvas id="canvas"></canvas>
      </div>
    </div>
  </body>
</html>
