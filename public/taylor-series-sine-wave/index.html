<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Taylor Series Sine Wave Approximation</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <div id="formula-overlay">
        <span id="formula-text"></span>
      </div>

      <canvas id="canvas"></canvas>

      <div id="control-panel">
        <div class="control-row">
          <label for="terms-slider">Taylor Polynomial Terms: <span id="terms-value">1</span></label>
          <input type="range" id="terms-slider" min="1" max="25" value="1" step="1" />
        </div>
        <div class="control-row">
          <label for="animation-speed">Animation Speed:</label>
          <input type="range" id="animation-speed" min="0.1" max="5.0" value="1.0" step="0.1" />
        </div>
      </div>
    </div>
  </body>
</html>
