<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Synthetic Stock Chart</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="container">
      <div id="controls">
        <h2>Parameters</h2>
        <div class="control-group">
          <label for="octaves-slider">Noise Octaves (<span id="octaves-value">4</span>)</label>
          <input type="range" id="octaves-slider" min="1" max="10" step="1" value="4" />
        </div>
      </div>
      <div id="canvas-container">
        <canvas id="chart-canvas"></canvas>
      </div>
    </div>
  </body>
</html>
