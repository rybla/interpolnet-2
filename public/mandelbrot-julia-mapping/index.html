<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mandelbrot Julia Mapping</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Mandelbrot &harr; Julia</h1>
      <p>Click anywhere on the Mandelbrot set to instantly map and animate the corresponding Julia set iteration.</p>
    </header>

    <main class="fractal-container">
      <div class="fractal-box mandelbrot-box">
        <div class="canvas-header">
          <h2>Mandelbrot Set</h2>
          <span class="coordinate-display" id="mandelbrot-coord">c = 0.000 + 0.000i</span>
        </div>
        <div class="canvas-wrapper">
          <canvas id="mandelbrot-canvas" width="400" height="400"></canvas>
          <div id="crosshair" class="crosshair hidden"></div>
          <div class="click-ripple" id="click-ripple"></div>
        </div>
        <div class="instructions">Interactive Area</div>
      </div>

      <div class="fractal-box julia-box">
        <div class="canvas-header">
          <h2>Julia Set</h2>
          <span class="loading-indicator" id="loading-indicator">Mapping...</span>
        </div>
        <div class="canvas-wrapper">
          <canvas id="julia-canvas" width="400" height="400"></canvas>
          <div class="overlay-fade hidden" id="overlay-fade"></div>
        </div>
        <div class="instructions">Generated Iteration</div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
