<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Toon Shading Deconstruction</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>

      <div id="controls-panel">
        <h2>Toon Shading Deconstruction</h2>
        <p class="description">
          Explore how smooth lighting gradients are snapped into sharp color bands using an interactive 1D step texture.
        </p>

        <div class="control-group">
          <h3>1D Step Texture</h3>
          <canvas id="ramp-canvas" width="256" height="32"></canvas>
          <div id="color-stops-container">
            <!-- Dynamically populated color stops -->
          </div>
          <button id="add-stop-btn">+ Add Color Stop</button>
        </div>

        <div class="control-group">
          <h3>Lighting</h3>
          <div class="slider-container">
            <label for="light-x">Light X</label>
            <input type="range" id="light-x" min="-10" max="10" step="0.1" value="5">
          </div>
          <div class="slider-container">
            <label for="light-y">Light Y</label>
            <input type="range" id="light-y" min="-10" max="10" step="0.1" value="5">
          </div>
          <div class="slider-container">
            <label for="light-z">Light Z</label>
            <input type="range" id="light-z" min="-10" max="10" step="0.1" value="5">
          </div>
        </div>

        <div class="control-group">
          <h3>Object</h3>
          <div class="slider-container">
            <label for="rotation-speed">Rotation Speed</label>
            <input type="range" id="rotation-speed" min="0" max="0.05" step="0.001" value="0.01">
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
