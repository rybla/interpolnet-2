<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Rule 30 Cellular Automaton</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <h1>Rule 30 Cellular Automaton</h1>
        <p>A simple 1D binary automaton demonstrating chaotic fractal generation.</p>
      </header>

      <div class="controls">
        <div class="control-group">
          <label for="ruleInput">Rule Number</label>
          <input type="number" id="ruleInput" min="0" max="255" value="30" />
        </div>

        <div class="control-group buttons">
          <button id="playBtn" class="btn" title="Play">Play</button>
          <button id="pauseBtn" class="btn" title="Pause" disabled>Pause</button>
          <button id="stepBtn" class="btn" title="Step">Step</button>
          <button id="resetBtn" class="btn" title="Reset">Reset</button>
        </div>
      </div>

      <main class="canvas-container">
        <canvas id="automatonCanvas"></canvas>
      </main>
    </div>
  </body>
</html>
