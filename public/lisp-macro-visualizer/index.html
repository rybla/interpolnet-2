<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lisp Macro Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="crt-overlay"></div>
  <div class="scanlines"></div>
  <div class="container">
    <header>
      <h1>LISP MACRO VISUALIZER</h1>
      <p>Interactive visualization of high-level Lisp syntax expanding into deeper parenthetical trees before evaluation.</p>
    </header>

    <main>
      <div class="sidebar">
        <h2>Presets</h2>
        <div class="preset-buttons" id="preset-buttons">
          <!-- Buttons generated by JS -->
        </div>
        <div class="macro-info" id="macro-info">
          <h3>Current Form</h3>
          <p id="macro-description">Select a preset to begin.</p>
          <div class="controls">
            <button id="reset-btn" disabled>Reset</button>
            <button id="expand-all-btn" disabled>Expand All</button>
          </div>
        </div>
      </div>

      <div class="canvas-container">
        <div class="canvas-header">
          <span class="status-indicator">●</span> EVALUATION PHASE: <span id="phase-label" class="phase-macro">MACROEXPAND</span>
        </div>
        <div class="canvas" id="canvas">
          <!-- Lisp AST rendered here -->
          <div class="placeholder">Select a preset macro to visualize...</div>
        </div>
      </div>
    </main>

    <footer>
      <span>INTERPOLNET 2 // SYSTEM.LISP</span>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
