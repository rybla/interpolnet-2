<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Rule 30 Explorer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="demo-container">
      <canvas id="automaton-canvas"></canvas>
      <div class="control-panel">
        <h1 class="demo-title">Rule 30 Explorer</h1>
        <p class="demo-desc">Watch simple binary rules generate chaotic fractal triangles.</p>
        <div class="controls">
          <button id="play-pause-btn" class="control-btn">Play</button>
          <button id="reset-btn" class="control-btn">Reset</button>

          <div class="slider-group">
            <label for="speed-slider">Speed</label>
            <input type="range" id="speed-slider" min="1" max="60" value="10">
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
