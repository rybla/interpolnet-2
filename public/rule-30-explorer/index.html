<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Rule 30 Explorer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <h1>Rule 30 Explorer</h1>
        <p>A one-dimensional cellular automaton that generates chaotic fractal triangles.</p>
      </header>

      <main class="main-content">
        <aside class="control-panel">
          <section class="controls">
            <h2>Controls</h2>
            <div class="button-group">
              <button id="btn-play-pause" class="btn">Pause</button>
              <button id="btn-step" class="btn">Step</button>
              <button id="btn-reset" class="btn">Reset</button>
            </div>

            <div class="slider-group">
              <label for="speed-slider">Speed</label>
              <input type="range" id="speed-slider" min="1" max="60" value="30">
            </div>
          </section>

          <section class="rule-key">
            <h2>Rule 30 Visual Key</h2>
            <div class="rule-grid">
              <!-- Keys generated dynamically or hardcoded here -->
              <div class="rule-item">
                <div class="rule-top"><div class="cell active"></div><div class="cell active"></div><div class="cell active"></div></div>
                <div class="rule-bottom"><div class="cell inactive"></div></div>
              </div>
              <div class="rule-item">
                <div class="rule-top"><div class="cell active"></div><div class="cell active"></div><div class="cell inactive"></div></div>
                <div class="rule-bottom"><div class="cell inactive"></div></div>
              </div>
              <div class="rule-item">
                <div class="rule-top"><div class="cell active"></div><div class="cell inactive"></div><div class="cell active"></div></div>
                <div class="rule-bottom"><div class="cell inactive"></div></div>
              </div>
              <div class="rule-item">
                <div class="rule-top"><div class="cell active"></div><div class="cell inactive"></div><div class="cell inactive"></div></div>
                <div class="rule-bottom"><div class="cell active"></div></div>
              </div>
              <div class="rule-item">
                <div class="rule-top"><div class="cell inactive"></div><div class="cell active"></div><div class="cell active"></div></div>
                <div class="rule-bottom"><div class="cell active"></div></div>
              </div>
              <div class="rule-item">
                <div class="rule-top"><div class="cell inactive"></div><div class="cell active"></div><div class="cell inactive"></div></div>
                <div class="rule-bottom"><div class="cell active"></div></div>
              </div>
              <div class="rule-item">
                <div class="rule-top"><div class="cell inactive"></div><div class="cell inactive"></div><div class="cell active"></div></div>
                <div class="rule-bottom"><div class="cell active"></div></div>
              </div>
              <div class="rule-item">
                <div class="rule-top"><div class="cell inactive"></div><div class="cell inactive"></div><div class="cell inactive"></div></div>
                <div class="rule-bottom"><div class="cell inactive"></div></div>
              </div>
            </div>
          </section>
        </aside>

        <section class="canvas-container">
          <canvas id="automaton-canvas"></canvas>
        </section>
      </main>
    </div>
  </body>
</html>
