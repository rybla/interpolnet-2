<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Eigenvector Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>Eigenvector Visualizer</h1>
        <p>A grid transformation tool that highlights the specific eigenvectors that scale but do not rotate during a linear matrix transformation.</p>
      </header>

      <main class="content-wrapper">
        <section class="controls-panel">
          <h2>Transformation Matrix</h2>
          <div class="matrix-input-grid">
            <div class="matrix-row">
              <input type="number" id="mat-a" value="1" step="0.1" />
              <input type="number" id="mat-b" value="0" step="0.1" />
            </div>
            <div class="matrix-row">
              <input type="number" id="mat-c" value="0" step="0.1" />
              <input type="number" id="mat-d" value="1" step="0.1" />
            </div>
          </div>

          <div class="action-buttons">
            <button id="btn-animate">Animate Transformation</button>
            <button id="btn-reset">Reset</button>
          </div>

          <div class="eigenvector-info">
            <h3>Eigenvalues & Eigenvectors</h3>
            <div id="eigen-info-content">
              <p>Adjust the matrix to see computed eigenvectors.</p>
            </div>
          </div>
        </section>

        <section class="visualization-panel">
          <div class="canvas-container">
            <canvas id="grid-canvas"></canvas>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
