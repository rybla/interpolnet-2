<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Lennard-Jones Gas Simulation</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="demo-container">
      <div class="canvas-wrapper">
        <canvas id="simulation-canvas"></canvas>
      </div>

      <div class="control-panel">
        <h1>Lennard-Jones Gas Simulation</h1>

        <div class="control-group">
          <label for="volume-slider">Volume / Pressure</label>
          <input type="range" id="volume-slider" min="0.1" max="1.0" step="0.01" value="1.0">
        </div>

        <div class="readouts">
          <div class="readout-item">
            <span class="label">Volume:</span>
            <span class="value" id="readout-volume">100%</span>
          </div>
          <div class="readout-item">
            <span class="label">Pressure:</span>
            <span class="value" id="readout-pressure">0.00</span>
          </div>
          <div class="readout-item">
            <span class="label">Temperature:</span>
            <span class="value" id="readout-temperature">0.00</span>
          </div>
        </div>

        <button id="reset-button">Reset Simulation</button>
      </div>
    </main>
  </body>
</html>
