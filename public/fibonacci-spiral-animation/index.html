<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Fibonacci Spiral Animation</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="controls-panel">
      <h2>Fibonacci Spiral</h2>
      <div class="control-group">
        <label>Current F<sub>n</sub>: <span id="current-fn-display">0</span></label>
        <label>Squares: <span id="current-squares-display">0</span></label>
      </div>
      <div class="control-group">
        <label for="speed-slider">Speed</label>
        <input type="range" id="speed-slider" min="1" max="10" value="5">
      </div>
      <div class="button-group">
        <button id="step-back-btn" title="Step Back">⏮</button>
        <button id="play-pause-btn" title="Play/Pause">⏸</button>
        <button id="step-forward-btn" title="Step Forward">⏭</button>
      </div>
    </div>
    <canvas id="canvas"></canvas>
  </body>
</html>
