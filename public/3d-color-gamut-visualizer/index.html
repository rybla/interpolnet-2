<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | 3D Color Gamut Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="ui-panel">
      <h1>3D Color Gamut Visualizer</h1>
      <p>Explore the geometric boundaries of different color spaces.</p>

      <div class="control-group">
        <label>Color Model:</label>
        <div class="button-group">
          <button id="btn-rgb" class="active">RGB</button>
          <button id="btn-hsv">HSV</button>
          <button id="btn-cielab">CIELAB</button>
        </div>
      </div>

      <div class="instructions">
        <p><strong>Drag</strong> to rotate</p>
        <p><strong>Scroll</strong> to zoom</p>
        <p><strong>Right-click drag</strong> to pan</p>
      </div>
    </div>

    <div id="canvas-container"></div>
  </body>
</html>
