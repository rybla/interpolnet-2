<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | 3D Color Gamut Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-overlay">
      <div class="panel">
        <h1>3D Color Gamut Visualizer</h1>
        <p>
          Compare the geometric differences between RGB, HSV, and CIELAB color models.
          Switch between spaces to see how the points animate between their coordinates in each model.
        </p>
        <div class="controls">
          <button class="mode-btn active" data-mode="rgb">RGB Cube</button>
          <button class="mode-btn" data-mode="hsv">HSV Cylinder</button>
          <button class="mode-btn" data-mode="cielab">CIELAB Volume</button>
        </div>
      </div>
    </div>
  </body>
</html>
