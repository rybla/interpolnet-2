<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulam Spiral Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <canvas id="spiral-canvas"></canvas>

        <div class="control-panel">
            <h1>Ulam Spiral Visualizer</h1>
            <p>Explore prime number distribution and diagonal clustering using quadratic equations.</p>

            <div class="equation-container">
                <div class="equation-display">
                    <span class="var-color" id="display-a">1</span><span class="math-term">n²</span> +
                    <span class="var-color" id="display-b">1</span><span class="math-term">n</span> +
                    <span class="var-color" id="display-c">41</span>
                </div>
            </div>

            <div class="controls-grid">
                <div class="control-group">
                    <label for="coeff-a">Coefficient 'a'</label>
                    <input type="range" id="coeff-a" min="-10" max="10" value="1" step="1">
                    <span class="val-display" id="val-a">1</span>
                </div>
                <div class="control-group">
                    <label for="coeff-b">Coefficient 'b'</label>
                    <input type="range" id="coeff-b" min="-20" max="20" value="1" step="1">
                    <span class="val-display" id="val-b">1</span>
                </div>
                <div class="control-group">
                    <label for="coeff-c">Coefficient 'c'</label>
                    <input type="range" id="coeff-c" min="-100" max="100" value="41" step="1">
                    <span class="val-display" id="val-c">41</span>
                </div>
            </div>

            <div class="zoom-controls">
                <div class="control-group">
                    <label for="zoom-slider">Zoom Level</label>
                    <input type="range" id="zoom-slider" min="0.1" max="100" value="10" step="0.1">
                </div>
                <div class="stats-display">
                    <span>Visible Range: <strong id="range-display">0</strong></span>
                    <span>Highlighted Primes: <strong id="prime-match-display" class="highlight-text">0</strong></span>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color prime-color"></div>
                    <span>Prime Number</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color highlight-color"></div>
                    <span>Equation Output</span>
                </div>
                 <div class="legend-item">
                    <div class="legend-color highlight-prime-color"></div>
                    <span>Highlighted Prime</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
