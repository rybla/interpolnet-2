<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shadow Mapping Split-Screen View</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <div id="title">Shadow Mapping Deconstructed</div>
        <div id="controls">
            <div class="control-group">
                <label for="light-x">Light X Position</label>
                <input type="range" id="light-x" min="-20" max="20" value="10" step="0.1">
            </div>
            <div class="control-group">
                <label for="light-z">Light Z Position</label>
                <input type="range" id="light-z" min="-20" max="20" value="10" step="0.1">
            </div>
            <div class="control-group">
                <label for="light-y">Light Y Position</label>
                <input type="range" id="light-y" min="2" max="30" value="15" step="0.1">
            </div>
        </div>
        <div class="labels">
            <div class="label left-label">Camera View</div>
            <div class="label right-label">Light Depth View</div>
        </div>
    </div>

    <canvas id="webgl-canvas"></canvas>

    <!-- Include Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="script.js" type="module"></script>
</body>
</html>
