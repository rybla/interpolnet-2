<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-System Fractal Trees Editor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <div class="controls">
            <h1>L-System Editor</h1>

            <div class="control-group">
                <label for="axiom">Axiom</label>
                <input type="text" id="axiom" value="F">
            </div>

            <div class="control-group">
                <label>Rules (e.g., F -> FF+[+F-F-F]-[-F+F+F])</label>
                <div id="rules-container">
                    <!-- Rules will be dynamically added here -->
                    <div class="rule-row">
                        <input type="text" class="rule-key" value="F" placeholder="Key">
                        <span>&rarr;</span>
                        <input type="text" class="rule-value" value="FF+[+F-F-F]-[-F+F+F]" placeholder="Replacement">
                        <button class="remove-rule-btn" aria-label="Remove Rule">&times;</button>
                    </div>
                </div>
                <button id="add-rule-btn">+ Add Rule</button>
            </div>

            <div class="control-group">
                <label for="iterations">Iterations: <span id="iterations-val">4</span></label>
                <input type="range" id="iterations" min="1" max="6" value="4">
            </div>

            <div class="control-group">
                <label for="angle">Angle: <span id="angle-val">22.5&deg;</span></label>
                <input type="range" id="angle" min="1" max="90" value="22.5" step="0.5">
            </div>

            <div class="info-panel">
                <p><strong>Commands:</strong></p>
                <ul>
                    <li><code>F</code> or <code>G</code>: Draw forward</li>
                    <li><code>+</code>: Turn right by Angle</li>
                    <li><code>-</code>: Turn left by Angle</li>
                    <li><code>[</code>: Save state (push)</li>
                    <li><code>]</code>: Restore state (pop)</li>
                    <li><code>X</code>, <code>Y</code>: Variables (ignored when drawing)</li>
                </ul>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
