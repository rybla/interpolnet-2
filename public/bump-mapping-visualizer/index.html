<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Bump Mapping Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header>
      <a href="../" class="back-link">&larr; Back to Home</a>
      <h1>Bump Mapping Visualizer</h1>
    </header>

    <main>
      <div class="controls">
        <label>
          <input type="checkbox" id="toggle-bump-map" checked />
          Enable Bump Map Effect
        </label>
        <label>
          <input type="checkbox" id="toggle-show-map" />
          Show Grayscale Height Map
        </label>
        <label>
          <input type="checkbox" id="toggle-normals" />
          Visualize Normal Vectors
        </label>
      </div>
      <div id="canvas-container"></div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  </body>
</html>
