<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Minimax Saddle Point</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-overlay">
      <h1>Minimax Saddle Point</h1>
      <p>Click and drag on the surface to drop the ball. Watch it settle into the minimax saddle point.</p>

      <div class="control-group">
        <label for="gravity-slider">Gravity</label>
        <input type="range" id="gravity-slider" min="1" max="50" value="20">
      </div>

      <div class="control-group">
        <label for="damping-slider">Friction</label>
        <input type="range" id="damping-slider" min="1" max="50" value="10">
      </div>

      <div class="stats">
        <div>Position: <span id="pos-display">(0.00, 0.00, 0.00)</span></div>
        <div>Velocity: <span id="vel-display">0.00</span></div>
      </div>

      <button id="reset-btn">Reset Ball</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  </body>
</html>
