<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Conic Sections Visualizer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./three.min.js"></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="container"></div>
    <div id="ui-panel">
      <h1>Conic Sections Visualizer</h1>
      <p>Adjust the slicing plane to see how it intersects the double cone, generating different conic sections.</p>

      <div class="control-group">
        <label for="angle-slider">Angle (<span id="angle-value">0</span>&deg;)</label>
        <input type="range" id="angle-slider" min="0" max="90" value="0" step="1">
      </div>

      <div class="control-group">
        <label for="offset-slider">Offset (<span id="offset-value">0.5</span>)</label>
        <input type="range" id="offset-slider" min="-2" max="2" value="0.5" step="0.05">
      </div>

      <div class="result-section">
        <h2>Conic Section:</h2>
        <div id="conic-type" class="pulse-active">Circle</div>
      </div>
    </div>
  </body>
</html>
