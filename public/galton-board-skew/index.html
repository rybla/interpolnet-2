<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Galton Board Skew</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <canvas id="simulation-canvas"></canvas>
      <div class="control-panel">
        <h1 class="title">Galton Board Skew</h1>
        <div class="control-group">
          <div class="label-row">
            <label for="skew-slider">Right Bounce Probability (p)</label>
            <span id="skew-value">0.50</span>
          </div>
          <input
            type="range"
            id="skew-slider"
            min="0.1"
            max="0.9"
            step="0.01"
            value="0.5"
          />
          <div class="hints">
            <span>Normal</span>
            <span>Poisson Skew</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
