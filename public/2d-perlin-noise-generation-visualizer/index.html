<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Perlin Noise Generation Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>2D Perlin Noise Generation Visualizer</h1>
            <p>Visualising the generation of 2D Perlin noise by showing the underlying gradient vectors and how bilinear interpolation smooths the resulting map.</p>
        </header>
        <main>
            <div class="canvas-container">
                <canvas id="noiseCanvas"></canvas>
            </div>
        </main>
        <footer>
            <p>An Interpolnet 2 Demo</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
