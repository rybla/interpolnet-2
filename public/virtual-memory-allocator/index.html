<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Virtual Memory Allocator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Virtual Memory Allocator</h1>
        <p>Visually mapping fragmented logical pages into physical RAM frames and disk swap space.</p>
        <div class="controls">
          <button id="btn-allocate">Allocate Page</button>
          <button id="btn-access-random">Access Random Page</button>
          <button id="btn-reset">Reset</button>
        </div>
      </header>

      <main class="memory-container">
        <svg id="mapping-lines" class="mapping-lines"></svg>

        <section class="memory-zone" id="zone-virtual">
          <h2>Virtual Address Space</h2>
          <div class="page-container" id="virtual-pages">
            <!-- Virtual pages generated by JS -->
          </div>
        </section>

        <section class="memory-zone" id="zone-ram">
          <h2>Physical RAM</h2>
          <div class="page-container" id="ram-frames">
            <!-- RAM frames generated by JS -->
          </div>
        </section>

        <section class="memory-zone" id="zone-swap">
          <h2>Disk Swap Space</h2>
          <div class="page-container" id="swap-frames">
            <!-- Swap frames generated by JS -->
          </div>
        </section>
      </main>

      <div id="log-panel" class="log-panel">
        <h3>System Log</h3>
        <ul id="log-list"></ul>
      </div>
    </div>
  </body>
</html>
