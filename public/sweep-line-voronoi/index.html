<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweep-line Voronoi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sweep-line Voronoi</h1>
            <p>Click on the canvas to place seed points. Watch the sweep-line generate the Voronoi diagram.</p>
        </header>

        <main>
            <div class="canvas-container">
                <canvas id="voronoiCanvas"></canvas>
            </div>

            <div class="controls">
                <button id="playPauseBtn">Pause</button>
                <button id="resetSweepBtn">Reset Sweep</button>
                <button id="clearPointsBtn">Clear Points</button>
                <div class="slider-group">
                    <label for="speedSlider">Speed:</label>
                    <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
