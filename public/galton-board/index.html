<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Galton Board Normal Distribution</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="ui-container">
      <header>
        <h1>Galton Board</h1>
        <p>Normal Distribution Visualizer</p>
      </header>
      <div class="controls">
        <button id="btn-toggle">Pause</button>
        <button id="btn-reset">Reset</button>
        <div class="slider-group">
          <label for="drop-rate">Drop Rate:</label>
          <input type="range" id="drop-rate" min="1" max="10" value="5" />
        </div>
      </div>
      <div class="stats">
        <span>Dropped: <strong id="stat-dropped">0</strong></span>
      </div>
    </div>
    <canvas id="simulation-canvas"></canvas>
  </body>
</html>
