<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | 2D Metaballs Liquid Simulator</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="demo-container">
      <div class="controls-panel">
        <h1>2D Metaballs Liquid Simulator</h1>
        <p>Render 2D metaballs that smoothly merge into one another like liquid drops by calculating the overlapping thresholds of their inverse-square distance functions.</p>

        <div class="control-group">
          <label for="metaball-count">Metaball Count: <span id="metaball-count-val">20</span></label>
          <input type="range" id="metaball-count" min="1" max="50" value="20" />
        </div>

        <div class="control-group">
          <label for="threshold">Threshold: <span id="threshold-val">1.0</span></label>
          <input type="range" id="threshold" min="0.1" max="5.0" step="0.1" value="1.0" />
        </div>

        <div class="control-group">
          <label for="base-radius">Base Radius: <span id="base-radius-val">40</span></label>
          <input type="range" id="base-radius" min="10" max="100" value="40" />
        </div>

        <div class="control-group">
          <label for="speed">Speed: <span id="speed-val">1.0</span></label>
          <input type="range" id="speed" min="0.0" max="3.0" step="0.1" value="1.0" />
        </div>
      </div>

      <div class="canvas-container">
        <canvas id="glcanvas"></canvas>
      </div>
    </div>
  </body>
</html>
