<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interpolnet 2 | Markov Chain Frog Jump</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app-container">
      <canvas id="simulation-canvas"></canvas>
      <div id="control-panel">
        <h2>Markov Chain Frog Jump</h2>
        <div class="control-group">
          <label for="speed-slider">Simulation Speed</label>
          <input type="range" id="speed-slider" min="1" max="100" value="50" />
        </div>
      </div>
    </div>
  </body>
</html>
    <canvas id="canvas"></canvas>

    <div id="ui-panel">
      <h2>Markov Chain Frog Jump</h2>
      <p class="description">
        Watch the frog jump between lilypads based on the transition probabilities.
      </p>

      <div class="controls">
        <button id="btn-play">Play</button>
        <button id="btn-pause" disabled>Pause</button>
        <button id="btn-step">Step</button>
      </div>

      <div id="probabilities">
        <!-- Sliders will be generated dynamically by JS -->
      </div>
    </div>
  </body>
</html>
